proxies: []
use_proxy: false
min_delay: 0.8
max_delay: 2.5
concurrency: 3
download_root: "downloads"
db_path: "data/wallpaper.db"
challenge_url: "https://haowallpaper.com/link/pc/certify/challenge"
probe_url: "https://haowallpaper.com/user/center"
free_daily_limit: 10
log_level: "INFO"

uploads:
  task_profile: "compressed_webp"
  profiles:
    - key: "compressed_webp"
      name: "压缩图床"
      enabled: true
      base_url: "https://imgbed.example.com"
      api_token: "replace-with-your-token"
      channel: "telegram"
      server_compress: true
      # 目录配置：横图/竖图/动态图分别存放的目录
      # 留空时使用默认值（bg/pc、bg/mb、bg/dynamic）
      folder_landscape: "bg/pc"
      folder_portrait: "bg/mb"
      folder_dynamic: "bg/dynamic"
      # 路径模板：非空时优先于上方固定目录，支持变量：
      # {type}={static|dynamic}  {category}=分类名  {year}  {month}  {date}
      # 示例："bg/{type}/{year}/{month}"  →  "bg/static/2025/03"
      folder_pattern: ""
      # 上传过滤：不满足条件的图片跳过上传
      upload_filter:
        min_width: null        # 最小宽度（像素），null 表示不限
        min_height: null       # 最小高度（像素），null 表示不限
        only_original: false   # true 时仅上传原图（非预览图）
      image_processing:
        enabled: true
        telegram_only: false
        format: "webp"
        quality: 86
        min_quality: 72
        threshold_mb: 5
        target_mb: 4
        disable_above_mb: 10
    - key: "original_lossless"
      name: "原图图床"
      enabled: false
      base_url: "https://imgbed.example.com"
      api_token: ""
      channel: "huggingface"
      server_compress: false
      folder_landscape: "bg/pc"
      folder_portrait: "bg/mb"
      folder_dynamic: "bg/dynamic"
      folder_pattern: ""
      upload_filter:
        min_width: null
        min_height: null
        only_original: true    # 原图配置默认只上传原图
      image_processing:
        enabled: false
        telegram_only: false
        format: "original"
        quality: 100
        min_quality: 100
        threshold_mb: 5
        target_mb: 4
        disable_above_mb: 10

# ── 媒体格式转换 ───────────────────────────────────────────────────────────
# 下载完成后自动转换格式；也可在画廊手动批量转换
# 视频转换需要 imageio-ffmpeg（pip 包，首次使用时自动下载约 60MB ffmpeg 二进制）
# 静态图转换仅需 Pillow（已内置）
media_convert:
  auto_convert: false      # true = 下载时自动触发转换（建议先测试后再开启）
  max_concurrent: 1        # 同时运行的转换任务数（低配机建议 1）

  video:                   # MP4 → 动态 WebP / GIF
    enabled: false
    output_format: "webp"  # "webp" | "gif"（WebP 体积更小，浏览器直接以 <img> 自动循环播放）
    fps: 0                 # 0 = 保留源帧率（默认原图直出）
    max_frames: 0          # 0 = 全帧保留（默认不裁剪时长）
    width: 0               # 输出宽度（0 = 使用 max_width 自动裁剪）
    max_width: 0           # 0 = 不缩放（默认保留原分辨率）
    quality: 100           # WebP 质量（1-100，默认尽量保真）
    delete_original: false # true = 转换成功后删除原 MP4
    timeout_seconds: 300   # 单文件超时（秒）；全帧转换（max_frames=0）时自动忽略
    cpu_nice: 5            # CPU 调度降权（0=不降，5=后台，19=最低；仅 Linux）

  image:                   # PNG/JPEG → WebP / JPG / PNG
    enabled: false
    output_format: "webp"  # "webp" | "jpg" | "png"
    quality: 100           # JPEG/WebP 质量（1-100，默认尽量保真）
    delete_original: false # true = 转换成功后删除原文件
    timeout_seconds: 120   # 单文件超时（秒）
    cpu_nice: 5            # CPU 调度降权
